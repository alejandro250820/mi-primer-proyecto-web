<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Presupuesto Universitario</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>💰 Asistente de Gastos</h1>

        <div class="input-section">
            <input type="text" id="nombre-gasto" placeholder="Ej: Pasaje">
            <input type="number" id="monto-gasto" placeholder="S/ 0.00">
            <button id="btn-agregar">Agregar Gasto</button>
        </div>

        <div class="report-section">
            <h2>Total Gastado: S/. <span id="total">0.00</span></h2>
            <ul id="lista-gastos">
            </ul>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
